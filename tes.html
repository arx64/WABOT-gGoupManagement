<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: sans-serif;
  margin: 0;
}
.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.header {
  background-color: #fff;
  padding: 10px;
  border-bottom: 1px solid #eee;
  display: flex;
  align-items: center;
}
.header h1 {
  margin: 0;
  font-size: 1.2rem;
}
.header button {
  margin-left: auto;
  background-color: transparent;
  border: none;
  font-size: 1.5rem;
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}
.message {
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 5px;
}
.message.sent {
  background-color: #dcf8c6;
  margin-left: auto;
  text-align: right;
}
.message.received {
  background-color: #f5f5f5;
}
.input-area {
  background-color: #fff;
  padding: 10px;
  border-top: 1px solid #eee;
  display: flex;
  align-items: center;
}
.input-area textarea {
  flex: 1;
  padding: 10px;
  border: 1px solid #eee;
  border-radius: 5px;
  resize: none;
}
.input-area button {
  margin-left: 10px;
  padding: 10px;
  background-color: #007bff;
  color: #fff;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>
 <body>
  <div class="container">
    <div class="header">
      <h1>SMS</h1>
      <button>+</button>
    </div>
    <div class="messages">
      <!-- pesan-pesan akan ditampilkan di sini -->
    </div>
    <div class="input-area">
      <textarea placeholder="Tulis pesan..."></textarea>
      <button>Kirim</button>
    </div>
  </div>
</body>
</html>
